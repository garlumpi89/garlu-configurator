
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARLU Configurator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="stacked-logo">
      <div>GARLU</div>
      <div class="small">FADER</div>
      <div class="mini">- MINI -</div>
    </div>

    <div class="device-pill">
      <span id="statusDot" class="status-dot"></span>
      <div>
        <div id="connectionStatus">Not connected</div>
        <small id="deviceInfo">No device detected</small>
      </div>
    </div>
  </aside>

  <main class="workspace">
    <div class="topbar">
      <h1>Configure</h1>
      <div class="top-actions">
        <button id="connectBtn" class="button ghost">Connect GARLU</button>
        <button class="button primary">Configure GARLU</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel assignments-panel">
        <div class="panel-header">
          <h3>MIDI CC Assignments</h3>
        </div>

        <div class="fader-grid">
          <div class="fader-card"><div class="fader-icon"></div><input value="11"></div>
          <div class="fader-card"><div class="fader-icon"></div><input value="1"></div>
          <div class="fader-card"><div class="fader-icon"></div><input value="21"></div>
          <div class="fader-card"><div class="fader-icon"></div><input value="7"></div>
        </div>
      </section>

      <aside class="panel settings-panel">
        <h3>Device Settings</h3>

        <label class="setting">
          <span>Screen layout</span>
          <select>
            <option>Standard Layout</option>
            <option>Performance Layout</option>
          </select>
        </label>

        <label class="setting">
          <span>Resolution</span>
          <select>
            <option>MIDI 1.0 (7-bit)</option>
            <option>Enhanced MIDI 1.0 (14-bit)</option>
          </select>
        </label>

        <label class="setting">
          <span>OLED brightness</span>
          <select>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </label>

        <label class="setting">
          <span>Ring brightness</span>
          <select>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </label>

        <div id="deviceSummary" class="device-summary">GARLU Fader Mini · FW v1.7</div>
      </aside>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
